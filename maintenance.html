<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Onderhoud - Delicorner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-y: auto;
            color: #2c2c2c;
        }

        .maint-wrap {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem 2rem 2rem;
        }

        .maint-bg {
            position: absolute;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1509722747041-616f39b57569?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        .maint-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(139, 69, 19, 0.85) 0%, rgba(184, 145, 95, 0.75) 50%, rgba(139, 69, 19, 0.9) 100%);
            z-index: 1;
        }

        .maint-particles {
            position: absolute;
            inset: 0;
            z-index: 2;
            overflow: hidden;
        }
        .maint-particles::before,
        .maint-particles::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(212, 165, 116, 0.08);
            filter: blur(60px);
        }
        .maint-particles::before {
            top: 15%;
            left: 10%;
            animation: float 8s ease-in-out infinite;
        }
        .maint-particles::after {
            bottom: 20%;
            right: 15%;
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -20px) scale(1.1); }
        }

        .maint-content {
            position: relative;
            z-index: 3;
            max-width: 520px;
        }

        .maint-logo {
            margin-bottom: 1.5rem;
        }

        .maint-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
        }

        .maint-logo-accent {
            color: #d4a574;
        }

        .maint-halal {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.3rem 0.9rem;
            background: #2d8659;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            border-radius: 4px;
        }

        .maint-icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 1.25rem;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 165, 116, 0.5);
            animation: toolSpin 4s ease-in-out infinite;
        }

        @keyframes toolSpin {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .maint-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .maint-text {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
            margin-bottom: 0.75rem;
        }

        .maint-heart {
            margin-top: 2rem;
            font-size: 1.75rem;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .maint-divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4a574, transparent);
            margin: 1rem auto;
            border-radius: 2px;
        }

        @media (max-height: 700px) {
            .maint-wrap { padding: 1rem 1.5rem; justify-content: flex-start; padding-top: 2rem; }
            .maint-logo { margin-bottom: 1rem; }
            .maint-icon { width: 70px; height: 70px; font-size: 2.5rem; margin-bottom: 1rem; }
            .maint-title { font-size: 1.5rem; margin-bottom: 0.75rem; }
            .maint-text { font-size: 1rem; margin-bottom: 0.5rem; }
            .maint-heart { margin-top: 1rem; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="maint-wrap">
        <div class="maint-bg"></div>
        <div class="maint-overlay"></div>
        <div class="maint-particles"></div>

        <div class="maint-content">
            <div class="maint-logo">
                <div class="maint-logo-text">DELI<span class="maint-logo-accent">CORNER</span></div>
                <span class="maint-halal">HALAL</span>
            </div>

            <div class="maint-icon">🔧</div>

            <h1 class="maint-title">Tijdelijke sluiting voor onderhoud</h1>

            <div class="maint-divider"></div>

            <p class="maint-text">We brengen momenteel verbeteringen aan op onze website.</p>
            <p class="maint-text">Bestellingen zijn binnenkort weer mogelijk.</p>

            <p class="maint-heart">Binnenkort weer open 💛</p>
        </div>
    </div>
</body>
</html>
